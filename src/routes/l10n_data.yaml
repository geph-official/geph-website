      <div class="faq-item">
        <h3 class="faq-question">Разве цензор не может просто скачать Geph и заблокировать все серверы?</h3>
        <p class="faq-answer">
          И да, и нет. Geph использует двухпереходную архитектуру: пользователи подключаются к
          <em>выходным</em> узлам через ретрансляторы-<em>мосты</em>. Цензоры могут блокировать
          все выходные серверы и действительно делают это, но заблокировать мосты намного сложнее.
        </p>
        <p class="faq-answer">
          Причина в том, что трудно блокируемый bootstrap-протокол назначает
          <em>разным пользователям разные мосты</em> и постоянно ротирует их, поэтому полный
          перебор практически невозможен. С 2019 года мы наблюдали автоматизированные попытки
          перебора со стороны китайского GFW, но они стабильно не могли нарушить работу сервиса.
